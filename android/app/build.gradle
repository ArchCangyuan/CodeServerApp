plugins {
    id "com.android.application"
}

android {
    namespace "net.archcangyuan.codeserverapp"
    compileSdk 36

    defaultConfig {
        applicationId "net.archcangyuan.codeserverapp"
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    lint {
        abortOnError true
        warningsAsErrors false
    }
}
